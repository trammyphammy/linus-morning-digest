<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Linus Brief — April 16, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FAF6EF;color:#2C2C2C;font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:3rem}
.masthead{background:#1B6B6B;color:#FAF6EF;text-align:center;padding:2.5rem 1.5rem 2rem}
.masthead-eyebrow{font-size:.65rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;opacity:.7;margin-bottom:.5rem}
.masthead-title{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:700;letter-spacing:.02em;line-height:1;margin-bottom:.4rem}
.masthead-date{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;opacity:.6;margin-bottom:1.1rem}
.masthead-liner{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;opacity:.9;max-width:340px;margin:0 auto;line-height:1.5}
.divider{width:3rem;height:2px;background:#C4963A;margin:1.1rem auto 0;opacity:.7}
.content{max-width:680px;margin:0 auto;padding:2rem 1rem}
.category-section{margin-bottom:2.5rem}
.section-tag{display:inline-block;color:#FAF6EF;font-size:.6rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;padding:.3rem .75rem;border-radius:2px;margin-bottom:1rem}
.cards-grid{display:flex;flex-direction:column;gap:.85rem}
.card{background:#FFFDF8;border-radius:6px;padding:1.1rem 1.1rem 1.1rem 1.4rem;border-left:3px solid var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:#1A1A1A;margin-bottom:.4rem;line-height:1.35}
.card-summary{font-size:.85rem;color:#555;line-height:1.6}
.footer{text-align:center;font-size:.7rem;color:#AAA;letter-spacing:.1em;margin-top:3rem;text-transform:uppercase}
.no-content{text-align:center;font-family:'Playfair Display',serif;font-style:italic;color:#999;padding:3rem 0}
@media(min-width:480px){.masthead-title{font-size:3rem}}
</style>
</head>
<body>
<header class="masthead">
    <div class="masthead-eyebrow">Your Morning Briefing</div>
    <div class="masthead-title">The Linus Brief</div>
    <div class="masthead-date">April 16, 2026</div>
    <div class="masthead-liner">Morning's messy beauty resides in its imperfections, not its schedules.</div>
    <div class="divider"></div>
</header>
<main class="content">
<p class="no-content">Nothing new ingested in the last 24 hours. Rest easy.</p>
</main>
<footer class="footer">Compiled by Linus &middot; April 16, 2026</footer>
</body>
</html>
